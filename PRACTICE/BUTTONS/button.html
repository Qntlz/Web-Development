<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Buttons</title>
</head>
<body>
    <!--Practice Button Styles with CSS-->
   <div class="container">
    <div>
        <p>Youtube Subscribe Button</p>
        <button class="subscribe-button">SUBSCRIBE</button>
    </div>
    <div>
        <p>Youtube Join Button</p>
        <button class="join-button">JOIN</button>
    </div>
    <div>
        <p>Tweeter</p>
        <button class="tweet-button">Tweet</button>
    </div>
    <div>
        <p>Uber</p>
        <button class="uber-button">Request now</button>
    </div>
    <div>
        <p>Amazon</p>
        <button class="amazon-button">Add to Cart</button>
    </div>
    <div>
        <p>Github</p>
        <button class="github-button">Sign Up</button>
    </div>
    <div>
        <div>Bootstrap</div>
        <div>
            <div>
                <button class="bootstrap-button1">Get Started</button>
                <button class="bootstrap-button2">Download</button>
            </div>
        </div>
    </div>
    <div>
        <div>LinkedIn</div>
        <div>
            <button class="linkedIn-button1">Apply on company website</button>
            <button class="linkedIn-button2">Save</button>
        </div>
    </div>
   </div>
</body>
</html>
